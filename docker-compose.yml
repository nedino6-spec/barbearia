version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agendazap-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-agendazap_prod}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - agendazap-network

  redis:
    image: redis:alpine
    container_name: agendazap-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - agendazap-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agendazap-backend
    restart: always
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - PORT=3333
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-agendazap_prod}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_prod_2026}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:80}
    depends_on:
      - db
      - redis
    networks:
      - agendazap-network
    volumes:
      # Volume for WhatsApp Session persistence
      - wwebjs_auth:/app/.wwebjs_auth

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agendazap-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - agendazap-network

networks:
  agendazap-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  wwebjs_auth:
